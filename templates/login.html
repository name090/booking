{% extends 'base.html' %}

{% block content %}
    <h1>Реєстрація</h1>
    <form action="" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Введіть ваш логін</label>
            <input type="text" name="username" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        {% if form.username.errors %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ form.username.errors }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endif %}
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Введіть ваш пароль</label>
            <input type="password" name="password" class="form-control" id="exampleInputPassword1">
        </div>
         {% if form.password.errors %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ form.password.errors }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endif %}
        <div class="mb-3">
            <label for="exampleInputPassword2" class="form-label">Підтвердіть ваш пароль</label>
            <input type="password" name="password2" class="form-control" id="exampleInputPassword2">
        </div>
        {% if form.password2.errors %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ form.password2.errors }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">Зареєструватися</button>
    </form>
{% endblock %}
